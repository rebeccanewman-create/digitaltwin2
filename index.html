<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIST CAD Digital Twin Viewer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            pointer-events: none;
            z-index: 20;
        }
        
        /* 📊 Dashboard & Integrated Chat Panel Styling */
        #dashboard {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 320px;
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            color: #ffffff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            pointer-events: auto;
            z-index: 10;
            display: flex;
            flex-direction: column;
        }
        #dashboard h2 {
            margin: 0 0 10px 0;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00adb5;
        }
        #dashboard hr {
            border: 0;
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 10px 0;
        }
        .metric {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .label {
            color: #aaaaaa;
        }
        .value {
            font-weight: bold;
            font-family: monospace;
        }
        .status-good {
            color: #39ec5c;
        }

        /* 🤖 Embedded Chat Box Styling */
        #chat-history {
            height: 180px;
            overflow-y: auto;
            margin-bottom: 10px;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 5px;
        }
        .msg {
            padding: 6px 10px;
            border-radius: 6px;
            line-height: 1.4;
            max-width: 85%;
            word-wrap: break-word;
        }
        .ai-msg {
            background: #222222;
            color: #e0e0e0;
            align-self: flex-start;
            border-left: 3px solid #00adb5;
        }
        .user-msg {
            background: #00adb5;
            color: white;
            align-self: flex-end;
        }
        #chat-input-container {
            display: flex;
            gap: 6px;
        }
        #chat-input {
            flex: 1;
            background: #222222;
            border: 1px solid #444444;
            color: white;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 12px;
            outline: none;
        }
        #chat-input:focus {
            border-color: #00adb5;
        }
        #chat-send-btn {
            background: #00adb5;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
        }
        #chat-send-btn:hover {
            background: #008c95;
        }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>

    <div id="loading">Loading 3D CAD Model...</div>
    <div id="canvas-container"></div>

    <div id="dashboard">
        <h2>Live Telemetry Metrics</h2>
        <div class="metric">
            <span class="label">Extruder Temperature:</span>
            <span class="value" id="temp-val">215°C</span>
        </div>
        <div class="metric">
            <span class="label">Current Layer Height:</span>
            <span class="value" id="layer-val">0.200 mm</span>
        </div>
        <div class="metric">
            <span class="label">Print Speed:</span>
            <span class="value" id="speed-val">60 mm/s</span>
        </div>
        <div class="metric">
            <span class="label">System Status:</span>
            <span class="value status-good" id="status-val">OPERATIONAL</span>
        </div>

        <hr>
        
        <h2>Ask Digital Twin AI</h2>
        <div id="chat-history">
            <div class="msg ai-msg">System grounded. I can see the live telemetry framework for the SS-J3 part. Ask me a manufacturing evaluation question.</div>
        </div>
        <div id="chat-input-container">
            <input type="text" id="chat-input" placeholder="Is the temperature stable?..." onkeypress="handleKeyPress(event)">
            <button id="chat-send-btn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 1. Setup the Scene, Camera, and Renderer
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 2. Add Orbit Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // 3. Add Studio Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight1.position.set(5, 10, 7);
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
        dirLight2.position.set(-5, 5, -5);
        scene.add(dirLight2);

        // 4. Load the CAD Model
        const loader = new GLTFLoader();
        
        loader.load(
            'SS-J3.glb', 
            function (gltf) {
                const model = gltf.scene;
                
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                
                model.position.sub(center);
                
                const maxDim = Math.max(size.x, size.y, size.z);
                if (maxDim > 0) {
                    const scaleFactor = 5 / maxDim;
                    model.scale.set(scaleFactor, scaleFactor, scaleFactor);
                }
                
                scene.add(model);
                
                const loadingElement = document.getElementById('loading');
                if (loadingElement) {
                    loadingElement.style.display = 'none';
                }
                console.log("Model successfully auto-scaled, centered, and loaded!");
            },
            function (xhr) {
                console.log((xhr.loaded / xhr.total * 100) + '% loaded');
            },
            function (error) {
                console.error("An error happened loading the model:", error);
                document.getElementById('loading').innerText = "Failed to load 3D model.";
            }
        );

        // 5. Handle Window Resizing
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 6. Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // 7. Live Telemetry Simulation
        let baseTemp = 215;
        let currentLayer = 0.20;

        setInterval(() => {
            let jitter = (Math.random() - 0.5) * 2; 
            let simulatedTemp = (baseTemp + jitter).toFixed(1);
            
            currentLayer += 0.001;
            
            document.getElementById('temp-val').innerText = simulatedTemp + '°C';
            document.getElementById('layer-val').innerText = currentLayer.toFixed(3) + ' mm';
            
            const statusVal = document.getElementById('status-val');
            if (simulatedTemp > 215.8) {
                statusVal.innerText = 'WARNING: HIGH TEMP';
                statusVal.style.color = '#ff4a4a';
            } else {
                statusVal.innerText = 'OPERATIONAL';
                statusVal.style.color = '#39ec5c';
            }
        }, 1000);
    </script>

    <script>
        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const messageText = input.value.trim();
            if (!messageText) return;

            // 1. Append User Message Box
            const history = document.getElementById('chat-history');
            const userDiv = document.createElement('div');
            userDiv.className = 'msg user-msg';
            userDiv.innerText = messageText;
            history.appendChild(userDiv);
            input.value = '';
            history.scrollTop = history.scrollHeight;

            // 2. Scrape Current Telemetry Metrics from View Container
            const liveTemp = document.getElementById('temp-val').innerText;
            const liveLayer = document.getElementById('layer-val').innerText;
            const liveSpeed = document.getElementById('speed-val').innerText;
            const liveStatus = document.getElementById('status-val').innerText;

            // 3. Append Pending AI Message Box Placeholder
            const aiDiv = document.createElement('div');
            aiDiv.className = 'msg ai-msg';
            aiDiv.innerText = "Analyzing twin telemetry...";
            history.appendChild(aiDiv);
            history.scrollTop = history.scrollHeight;

            // 4. Prompt Engineering System Instruction Blueprint
            const systemInstructions = `You are a helpful NIST Cyber-Physical Digital Twin Assistant monitoring an additive manufacturing test run of CAD component assembly 'SS-J3'.
You have direct line sight to the live machine metrics:
- Process Temperature: ${liveTemp}
- Current Layer Z-Height: ${liveLayer}
- Axis Feedrate Speed: ${liveSpeed}
- Operational Status: ${liveStatus}

Evaluate the user's question explicitly utilizing these variables. Keep answers clear, technical, and limited to 2 sentences.`;

            try {
                // 5. Connect directly to the Hugging Face Serverless LLM Inference Web Gateway
                const response = await fetch('https://api-inference.huggingface.co/models/Qwen/Qwen2.5-Coder-7B-Instruct/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [
                            { role: 'system', content: systemInstructions },
                            { role: 'user', content: messageText }
                        ],
                        max_tokens: 150,
                        temperature: 0.2
                    })
                });

                const data = await response.json();
                if (data.choices && data.choices[0].message) {
                    aiDiv.innerText = data.choices[0].message.content;
                } else {
                    throw new Error("Invalid response format");
                }
            } catch (error) {
                console.error("AI Fetch Failure:", error);
                aiDiv.innerText = `[Offline Mode] Telemetry logged: Temp=${liveTemp}, Height=${liveLayer}. Unable to reach cloud model inference network.`;
            }
            history.scrollTop = history.scrollHeight;
        }
    </script>
</body>
</html>
